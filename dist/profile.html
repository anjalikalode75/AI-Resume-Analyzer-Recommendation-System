<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — ResumeIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script type="module" crossorigin src="/assets/profile-BmZ4mefU.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/firebase-config-CNCDk2Wj.js">
  <link rel="stylesheet" crossorigin href="/assets/profile-BM4dSvAo.css">
  <link rel="stylesheet" crossorigin href="/assets/responsive-DZGVsjs0.css">
  <link rel="stylesheet" crossorigin href="/assets/dashboard-Cm85ZPWj.css">
</head>
<body class="dash-body">
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="logo"><span class="logo-mark">R</span><span>ResumeIQ</span></a>
    <nav class="side-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="profile.html" class="active">👤 Profile</a>
    </nav>
    <button id="logoutBtn" class="btn btn-outline btn-block">Logout</button>
  </aside>

  <main class="dash-main">
    <header class="dash-header">
      <button class="hamburger" id="sideToggle">☰</button>
      <h2>Profile Settings</h2>
    </header>

    <section class="panel profile-card glass-card">
      <div class="profile-top">
        <div class="profile-pic-wrap">
          <img id="profilePic" src="https://api.dicebear.com/7.x/initials/svg?seed=User" alt="Profile"/>
          <label for="picUpload" class="pic-edit">📷</label>
          <input type="file" id="picUpload" accept="image/*" hidden/>
        </div>
        <div>
          <h2 id="profileName">User</h2>
          <p class="muted" id="profileEmail">user@example.com</p>
        </div>
      </div>

      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="displayName" placeholder="Your name"/>
      </div>
      <button class="btn btn-primary" id="saveProfile">Save Changes</button>

      <hr/>
      <h3>Change Password</h3>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="New password"/>
      </div>
      <button class="btn btn-outline" id="changePwdBtn">Update Password</button>
    </section>

    <section class="panel">
      <h3>📚 Uploaded Resumes & Reports</h3>
      <div id="userResumes" class="resumes-list"><p class="muted">Loading...</p></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/theme.js"></script>
</body>
</html>
