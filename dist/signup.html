<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ResumeIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script type="module" crossorigin src="/assets/firebase-config-CNCDk2Wj.js"></script>
  <script type="module" crossorigin src="/assets/auth-CTCnkPKm.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/auth-CYzVi04B.css">
  <link rel="stylesheet" crossorigin href="/assets/responsive-DZGVsjs0.css">
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <a href="index.html" class="logo auth-logo"><span class="logo-mark">R</span><span>ResumeIQ</span></a>
    <div class="auth-card glass-card">
      <h1>Create your account</h1>
      <p class="muted">Start analyzing your resume in seconds</p>
      <form id="signupForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" required/>
          <div class="password-strength"><div id="strengthBar"></div></div>
          <small class="muted">Use 8+ chars with uppercase, number, and symbol</small>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="signupBtn">Create Account</button>
        <div class="divider"><span>or</span></div>
        <button type="button" class="btn btn-outline btn-block" id="googleBtn">🔵 Continue with Google</button>
        <p class="auth-foot">Already have an account? <a href="login.html" class="link">Login</a></p>
      </form>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</body>
</html>
