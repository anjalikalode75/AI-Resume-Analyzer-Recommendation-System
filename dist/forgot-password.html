<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — ResumeIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script type="module" crossorigin src="/assets/firebase-config-CNCDk2Wj.js"></script>
  <script type="module" crossorigin src="/assets/auth-CTCnkPKm.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/auth-CYzVi04B.css">
  <link rel="stylesheet" crossorigin href="/assets/responsive-DZGVsjs0.css">
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <a href="index.html" class="logo auth-logo"><span class="logo-mark">R</span><span>ResumeIQ</span></a>
    <div class="auth-card glass-card">
      <h1>Forgot password?</h1>
      <p class="muted">We'll send a reset link to your email</p>
      <form id="resetForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="resetBtn">Send Reset Link</button>
        <p class="auth-foot">Remember your password? <a href="login.html" class="link">Login</a></p>
      </form>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</body>
</html>
